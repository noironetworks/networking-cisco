- job:
    name: networking-cisco-ndfc-tests
    parent: openstack-tox-py312
    description: "Runs only the NDFC driver unit tests as a voting gate."
    vars:
      tox_envlist: ndfc

- job:
    name: networking-cisco-coverage
    parent: openstack-tox-cover
    description: "Runs unit tests with coverage reporting."
    vars:
      tox_envlist: cover

- project:
    name: x/networking-cisco
    templates:
      - openstack-python3-jobs
    check:
      jobs:
        - openstack-tox-pep8:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - networking-cisco-ndfc-tests:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - networking-cisco-coverage:
            timeout: 6000
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - openstack-tox-py310:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - openstack-tox-py311:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - openstack-tox-py312:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - openstack-tox-py313:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
    gate:
      jobs:
        - openstack-tox-pep8:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - networking-cisco-ndfc-tests:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - networking-cisco-coverage:
            timeout: 6000
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - openstack-tox-py310:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - openstack-tox-py311:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - openstack-tox-py312:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
        - openstack-tox-py313:
            required-projects:
              - name: openstack/requirements
                override-checkout: stable/2026.1
